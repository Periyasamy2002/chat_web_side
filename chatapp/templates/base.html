<!DOCTYPE html>
<html lang="en">

<head>
    <title>Chat App</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fast realtime chat app with voice and text translation">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
   

  
        /* ================= RESET ================= */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #050816;
            color: white;
            position: relative;
        }

        /* ================= BACKGROUND ================= */

        body::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: #6c63ff;
            filter: blur(150px);
            opacity: 0.25;
            top: -200px;
            left: -200px;
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: #ff4ecd;
            filter: blur(150px);
            opacity: 0.25;
            bottom: -200px;
            right: -200px;
            z-index: -1;
        }

        /* ================= NAVBAR ================= */

        nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 16px 30px;

            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);

            position: sticky;
            top: 0;
            z-index: 999;

            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ================= LOGO ================= */

        .logo {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;

            text-decoration: none;

            transition: 0.35s ease;
        }

        /* ICON */

        .logo-link i {
            font-size: 30px;
            color: #6c63ff;

            animation: logoFloat 3s ease-in-out infinite;
            transition: 0.4s ease;
        }

        /* TEXT */

        .logo-link span {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;

            background: linear-gradient(90deg,
                    #ffffff,
                    #c4b5fd,
                    #ffb4e6,
                    #ffffff);

            background-size: 200% auto;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            animation: textGlow 5s linear infinite;
        }

        /* HOVER */

        .logo-link:hover {
            transform: translateY(-2px);
        }

        .logo-link:hover i {
            transform: rotate(12deg) scale(1.1);
            color: #ff4ecd;
        }

        /* ================= LOGO ANIMATIONS ================= */

        @keyframes logoFloat {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        @keyframes textGlow {

            0% {
                background-position: 0% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        /* ================= NAV LINKS ================= */

        .nav-links {
            display: flex;
            align-items: center;
            gap: 10px;

            transition: 0.4s ease;
        }

        .nav-links a {
            color: white;
            text-decoration: none;

            padding: 10px 16px;

            border-radius: 30px;

            position: relative;
            overflow: hidden;

            transition: 0.3s ease;
        }

        /* HOVER EFFECT */

        .nav-links a::after {
            content: '';

            position: absolute;

            width: 0%;
            height: 100%;

            top: 0;
            left: 50%;

            transform: translateX(-50%);

            background: linear-gradient(135deg,
                    #6c63ff,
                    #ff4ecd);

            transition: 0.4s ease;

            z-index: -1;
            border-radius: 30px;
        }

        .nav-links a:hover::after {
            width: 120%;
        }

        .nav-links a:hover {
            transform: translateY(-3px);
        }

        /* ================= USER BADGE ================= */

        .user-badge {
            padding: 8px 14px;

            border-radius: 20px;

            background: rgba(255, 255, 255, 0.08);

            border: 1px solid rgba(255, 255, 255, 0.1);

            font-size: 14px;
        }

        /* ================= MOBILE MENU BUTTON ================= */

        .menu-btn {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }

        .menu-btn span {
            width: 28px;
            height: 3px;

            background: white;

            border-radius: 10px;

            transition: 0.4s ease;
        }

        .menu-btn.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-btn.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-btn.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ================= MOBILE NAV ================= */

        .nav-user {
            display: none;
        }

        .close-menu {
            display: none;
        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:768px) {

            nav {
                padding: 15px 18px;
            }

            .menu-btn {
                display: flex;
                z-index: 1001;
            }

            .user-badge {
                display: none;
            }

            .nav-links {
                position: fixed;

                top: 0;
                right: -100%;

                width: 280px;
                height: 100vh;

                flex-direction: column;
                justify-content: center;
                align-items: center;

                padding: 2rem 1.25rem;

                background: rgba(10, 15, 30, 0.96);

                backdrop-filter: blur(25px);

                box-shadow: -10px 0 40px rgba(0, 0, 0, 0.6);

                visibility: hidden;

                transition: 0.4s ease;

                z-index: 1000;
            }

            .nav-links.show {
                right: 0;
                visibility: visible;
            }

            .nav-links a {
                width: 100%;
                text-align: center;

                margin: 10px 0;

                font-size: 18px;

                opacity: 0;
                transform: translateX(40px);

                transition: 0.4s ease;
            }

            .nav-links.show a {
                opacity: 1;
                transform: translateX(0);
            }

            .nav-user {
                display: block;

                width: 100%;

                padding: 12px;

                border-radius: 20px;

                background: rgba(255, 255, 255, 0.08);

                border: 1px solid rgba(255, 255, 255, 0.08);
            }

            .close-menu {
                display: block;

                position: absolute;

                top: 20px;
                right: 25px;

                font-size: 24px;

                cursor: pointer;
            }

            .logo-link span {
                font-size: 20px;
            }

            .logo-link i {
                font-size: 24px;
            }
        }
    </style>
    </style>
</head>

<body>

    <nav>

        <!-- LOGO -->

        <div class="logo">
            <a href="{% url 'home' %}" class="logo-link">
                <i class="fa-brands fa-rocketchat"></i>
                <span>TRANIT</span>
            </a>
        </div>

        <!-- MENU BUTTON -->
        <div class="menu-btn" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- LINKS -->
        <div class="nav-links">
            <!-- <div class="close-menu" onclick="toggleMenu()"><i class="fas fa-times"></i></div> -->

            <a href="{% url 'home' %}">Home</a>

            {% if user.is_authenticated %}
            <a href="#" class="nav-user">Hi, {{ user.username }}</a>

            {% if user.is_superuser %}
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <!-- <a href="{% url 'group_manage' %}">Groups</a> -->
            {% endif %}

            <a href="{% url 'chat' %}">Chat</a>
            <a href="{% url 'group_manage' %}">Groups</a>
            <a href="{% url 'logout' %}">Logout</a>

            {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
            {% endif %}

        </div>

        <!-- USER -->
        {% if user.is_authenticated %}
        <div class="user-badge">
            {{ user.username }}
        </div>
        {% endif %}

    </nav>

    <!-- CHAT -->

    {% block content %}
    {% endblock %}



    <script>
        function toggleMenu() {
            document.querySelector(".nav-links").classList.toggle("show");
            document.querySelector(".menu-btn").classList.toggle("active");
        }

        document.querySelectorAll(".nav-links a").forEach(link => {
            link.addEventListener("click", () => {
                document.querySelector(".nav-links").classList.remove("show");
                document.querySelector(".menu-btn").classList.remove("active");
            });
        });
    </script>

</body>

</html>
