<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            animation: backgroundShift 15s ease infinite;
        }

        @keyframes backgroundShift {
            0%, 100% {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
            50% {
                background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
            }
        }

        nav {
            background: linear-gradient(90deg, #1e1e1e 0%, #2d2d2d 50%, #1e1e1e 100%);
            padding: 0.75rem 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #667eea;
            animation: navSlideDown 0.6s ease-out;
            min-height: 50px;
        }

        @keyframes navSlideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-weight: 500;
            margin: 0 0.3rem;
            font-size: 0.95rem;
        }

        nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            z-index: -1;
            transition: left 0.3s ease;
        }

        nav a:hover::before {
            left: 0;
        }

        nav a:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .user-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 0.35rem 0.75rem;
            border-radius: 15px;
            color: white;
            font-weight: 600;
            animation: pulse 2s ease-in-out infinite;
            font-size: 0.85rem;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(102, 126, 234, 0);
            }
        }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
        }

        h1, h2, h3 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ul, li {
            list-style: none;
        }

        ul {
            animation: slideInLeft 0.6s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        li {
            padding: 0.75rem 1rem;
            margin: 0.5rem 0;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(240, 147, 251, 0.2));
            border-left: 4px solid #667eea;
            border-radius: 8px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        li:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(240, 147, 251, 0.4));
            transform: translateX(10px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            border-left-color: #f093fb;
        }

        p {
            color: white;
            line-height: 1.6;
        }

        /* ========== MOBILE MEDIA QUERIES ========== */
        @media (max-width: 768px) {
            nav {
                padding: 1rem;
                flex-wrap: wrap;
                gap: 1rem;
            }

            nav a {
                padding: 0.5rem 1rem;
                margin: 0.25rem;
                font-size: 0.95rem;
            }

            .nav-right {
                width: 100%;
                justify-content: center;
                gap: 0.5rem;
            }

            .user-badge {
                padding: 0.4rem 0.8rem;
                font-size: 0.9rem;
            }

            h1, h2, h3 {
                animation: fadeInDown 0.6s ease-out;
            }

            ul {
                animation: slideInLeft 0.6s ease-out;
            }

            li {
                padding: 0.6rem 0.8rem;
                margin: 0.4rem 0;
                border-radius: 6px;
            }

            li:hover {
                transform: translateX(5px);
            }
        }

        @media (max-width: 480px) {
            nav {
                padding: 0.75rem;
                justify-content: space-between;
            }

            nav a {
                padding: 0.4rem 0.8rem;
                margin: 0.2rem;
                font-size: 0.85rem;
            }

            .nav-right {
                gap: 0.3rem;
            }

            .user-badge {
                padding: 0.3rem 0.6rem;
                font-size: 0.8rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            h3 {
                font-size: 1.2rem;
            }

            p {
                font-size: 0.95rem;
            }

            ul {
                padding: 0 0.5rem;
            }

            li {
                padding: 0.5rem 0.6rem;
                margin: 0.3rem 0;
                font-size: 0.9rem;
                border-left-width: 3px;
            }

            li:hover {
                transform: translateX(3px);
            }
        }

        @media (max-width: 360px) {
            nav a {
                padding: 0.3rem 0.6rem;
                font-size: 0.75rem;
            }

            .user-badge {
                padding: 0.2rem 0.5rem;
                font-size: 0.7rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            h2 {
                font-size: 1.2rem;
            }

            h3 {
                font-size: 1rem;
            }
        }

        /* ========== TABLET MEDIA QUERIES ========== */
        @media (min-width: 769px) and (max-width: 1024px) {
            nav {
                padding: 1rem 1.5rem;
            }

            nav a {
                padding: 0.5rem 1.2rem;
                font-size: 0.95rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            h2 {
                font-size: 2rem;
            }
        }

        /* ========== SMOOTH SCROLLING ========== */
        html {
            scroll-behavior: smooth;
        }

        /* ========== TOUCH-FRIENDLY INTERACTIONS ========== */
        @media (hover: none) and (pointer: coarse) {
            nav a, button, .submit-btn, .back-btn {
                padding: 1rem;
                min-height: 48px;
                min-width: 48px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            li {
                padding: 1rem;
                margin: 0.5rem 0;
            }
        }

        /* ========== ANIMATION PERFORMANCE OPTIMIZATION ========== */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<nav>
    <div style="display: flex; gap: 1rem;">
        <a href="/">Home</a>
        <a href="/chat/">Chat</a>
    </div>
</nav>
</nav>

<hr>

{% block content %}{% endblock %}

</body>
</html>
