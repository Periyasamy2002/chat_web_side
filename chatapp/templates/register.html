{% extends 'base.html' %}

{% block content %}

<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 120px);
        padding: 2rem;
    }

    .auth-wrapper {
        width: 100%;
        max-width: 420px;
    }

    .auth-card {
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(240, 147, 251, 0.15));
        border: 2px solid rgba(102, 126, 234, 0.3);
        border-radius: 20px;
        padding: 2.5rem;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .tab-container {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        border-radius: 15px;
        background: rgba(0, 0, 0, 0.2);
        padding: 0.5rem;
    }

    .tab-btn {
        flex: 1;
        padding: 1rem;
        border: none;
        background: transparent;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 700;
        cursor: pointer;
        border-radius: 12px;
        transition: all 0.3s ease;
        font-size: 1rem;
    }

    .tab-btn.active {
        background: linear-gradient(90deg, #667eea, #764ba2);
        color: white;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    .tab-btn:hover {
        color: white;
    }

    .tab-content {
        display: none;
        animation: fadeIn 0.4s ease-out;
    }

    .tab-content.active {
        display: block;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }

    .auth-card h2 {
        text-align: center;
        margin-bottom: 2rem;
        color: white;
        font-size: 1.8rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
        animation: slideInUp 0.5s ease-out;
    }

    @keyframes slideInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: white;
        font-weight: 600;
        font-size: 0.95rem;
    }

    .form-group input {
        width: 100%;
        padding: 0.85rem 1rem;
        border: 2px solid rgba(102, 126, 234, 0.3);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    .form-group input::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        background: rgba(255, 255, 255, 0.15);
        box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
    }

    .form-group input:hover {
        border-color: #764ba2;
        background: rgba(255, 255, 255, 0.12);
    }

    .submit-btn {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(90deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        margin-top: 1.5rem;
    }

    .submit-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, #f093fb, #667eea);
        z-index: -1;
        transition: left 0.4s ease;
    }

    .submit-btn:hover::before {
        left: 0;
    }

    .submit-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .submit-btn:active {
        transform: translateY(-1px);
    }

    .messages-container {
        margin-bottom: 1.5rem;
    }

    .alert {
        padding: 1rem;
        border-radius: 10px;
        margin-bottom: 1rem;
        animation: slideInDown 0.4s ease-out;
        border-left: 4px solid;
    }

    @keyframes slideInDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .alert-error {
        background: rgba(239, 68, 68, 0.1);
        color: #fca5a5;
        border-left-color: #ef4444;
    }

    .alert-success {
        background: rgba(34, 197, 94, 0.1);
        color: #86efac;
        border-left-color: #22c55e;
    }

    .divider {
        text-align: center;
        margin: 1.5rem 0;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.9rem;
    }

    .form-footer {
        text-align: center;
        margin-top: 2rem;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.7);
    }

    .form-footer a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        cursor: pointer;
    }

    .form-footer a:hover {
        color: #764ba2;
        text-decoration: underline;
    }

    @media (max-width: 600px) {
        .auth-card {
            padding: 2rem;
        }

        .tab-container {
            gap: 0.5rem;
        }

        .tab-btn {
            padding: 0.75rem;
            font-size: 0.9rem;
        }
    }
</style>

<div class="auth-container">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('signin')">🔓 Sign In</button>
                <button class="tab-btn" onclick="switchTab('signup')">✨ Sign Up</button>
            </div>

            <!-- Messages -->
            <div class="messages-container">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert {% if message.tags %}alert-{{ message.tags }}{% else %}alert-error{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            </div>

            <!-- SIGN IN TAB -->
            <div id="signin" class="tab-content active">
                <h2>Welcome Back</h2>
                <form method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="signin">

                    <div class="form-group">
                        <label for="signin_email">📧 Email</label>
                        <input type="email" id="signin_email" name="signin_email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="signin_password">🔐 Password</label>
                        <input type="password" id="signin_password" name="signin_password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="submit-btn">Sign In 🚀</button>
                </form>

                <div class="form-footer">
                    Don't have an account? <a onclick="switchTab('signup')">Sign Up here</a>
                </div>
            </div>

            <!-- SIGN UP TAB -->
            <div id="signup" class="tab-content">
                <h2>Create Account</h2>
                <form method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="signup">

                    <div class="form-group">
                        <label for="signup_name">👤 Full Name</label>
                        <input type="text" id="signup_name" name="signup_name" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="signup_email">📧 Email</label>
                        <input type="email" id="signup_email" name="signup_email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="signup_password">🔐 Password</label>
                        <input type="password" id="signup_password" name="signup_password" placeholder="Create a password" required>
                    </div>

                    <div class="form-group">
                        <label for="signup_confirm_password">🔐 Confirm Password</label>
                        <input type="password" id="signup_confirm_password" name="signup_confirm_password" placeholder="Confirm your password" required>
                    </div>

                    <button type="submit" class="submit-btn">Sign Up ✨</button>
                </form>

                <div class="form-footer">
                    Already have an account? <a onclick="switchTab('signin')">Sign In here</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function switchTab(tab) {
        // Hide all tab contents
        document.querySelectorAll('.tab-content').forEach(el => {
            el.classList.remove('active');
        });
        document.querySelectorAll('.tab-btn').forEach(el => {
            el.classList.remove('active');
        });

        // Show selected tab
        document.getElementById(tab).classList.add('active');
        event.target.classList.add('active');
    }
</script>

{% endblock %}
