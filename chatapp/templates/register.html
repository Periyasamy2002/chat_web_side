{% extends 'base.html' %}

{% block content %}

<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 1rem;
    }

    .auth-wrapper {
        width: 100%;
        max-width: 420px;
    }

    .auth-card {
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(240, 147, 251, 0.15));
        border: 1.5px solid rgba(102, 126, 234, 0.3);
        border-radius: 15px;
        padding: 1.5rem;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .tab-container {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.2rem;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.2);
        padding: 0.3rem;
    }

    .tab-btn {
        flex: 1;
        padding: 0.7rem 0.5rem;
        border: none;
        background: transparent;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 700;
        cursor: pointer;
        border-radius: 10px;
        transition: all 0.3s ease;
        font-size: 0.9rem;
        min-height: 40px;
    }

    .tab-btn.active {
        background: linear-gradient(90deg, #667eea, #764ba2);
        color: white;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    .tab-btn:hover {
        color: white;
    }

    .tab-content {
        display: none;
        animation: fadeIn 0.4s ease-out;
    }

    .tab-content.active {
        display: block;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }

    .auth-card h2 {
        text-align: center;
        margin-bottom: 1.2rem;
        color: white;
        font-size: 1.4rem;
    }

    .form-group {
        margin-bottom: 1rem;
        animation: slideInUp 0.5s ease-out;
    }

    @keyframes slideInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .form-group label {
        display: block;
        margin-bottom: 0.3rem;
        color: white;
        font-weight: 600;
        font-size: 0.85rem;
    }

    .auth-card input {
        width: 100%;
        padding: 0.65rem 0.8rem;
        border: 2px solid rgba(102, 126, 234, 0.3);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        box-sizing: border-box;
        min-height: 44px;
    }

    .form-group input::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        background: rgba(255, 255, 255, 0.15);
        box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
    }

    .form-group input:hover {
        border-color: #764ba2;
        background: rgba(255, 255, 255, 0.12);
    }

    .submit-btn {
        width: 100%;
        padding: 0.75rem;
        background: linear-gradient(90deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        min-height: 44px;
        margin-top: 1.5rem;
    }

    .submit-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, #f093fb, #667eea);
        z-index: -1;
        transition: left 0.4s ease;
    }

    .submit-btn:hover::before {
        left: 0;
    }

    .submit-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .submit-btn:active {
        transform: translateY(-1px);
    }

    .messages-container {
        margin-bottom: 1.5rem;
    }

    .alert {
        padding: 1rem;
        border-radius: 10px;
        margin-bottom: 1rem;
        animation: slideInDown 0.4s ease-out;
        border-left: 4px solid;
    }

    @keyframes slideInDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .alert-error {
        background: rgba(239, 68, 68, 0.1);
        color: #fca5a5;
        border-left-color: #ef4444;
    }

    .alert-success {
        background: rgba(34, 197, 94, 0.1);
        color: #86efac;
        border-left-color: #22c55e;
    }

    .divider {
        text-align: center;
        margin: 1.5rem 0;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.9rem;
    }

    .form-footer {
        text-align: center;
        margin-top: 2rem;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.7);
    }

    .form-footer a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        cursor: pointer;
    }

    .form-footer a:hover {
        color: #764ba2;
        text-decoration: underline;
    }

    /* ========== MOBILE MEDIA QUERIES ========== */
    @media (max-width: 480px) {
        .auth-container {
            min-height: 100vh;
            padding: 0.8rem;
        }

        .auth-wrapper {
            max-width: 100%;
        }

        .auth-card {
            padding: 1.2rem;
            border-radius: 12px;
            border: 1.5px solid rgba(102, 126, 234, 0.3);
        }

        .tab-container {
            gap: 0.3rem;
            padding: 0.3rem;
            margin-bottom: 1rem;
            border-radius: 10px;
        }

        .tab-btn {
            padding: 0.6rem 0.5rem;
            font-size: 0.8rem;
            border-radius: 8px;
            min-height: 38px;
        }

        .tab-btn.active {
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.25);
        }

        .auth-card h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 0.8rem;
        }

        .form-group label {
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
        }

        .form-group input {
            padding: 0.6rem 0.65rem;
            font-size: 0.9rem;
            min-height: 40px;
        }

        .submit-btn {
            padding: 0.7rem;
            font-size: 0.9rem;
            min-height: 44px;
            margin-top: 0.8rem;
            border-radius: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .alert {
            padding: 0.7rem;
            margin-bottom: 0.6rem;
            border-radius: 6px;
            border-left-width: 3px;
            font-size: 0.85rem;
        }

        .form-footer {
            font-size: 0.75rem;
            margin-top: 1rem;
        }

        .divider {
            margin: 0.8rem 0;
            font-size: 0.75rem;
        }

        .messages-container {
            margin-bottom: 0.8rem;
        }

        .form-group label {
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
        }

        .form-group input {
            padding: 0.6rem 0.65rem;
            font-size: 0.9rem;
            border-radius: 8px;
            min-height: 40px;
        }

        .submit-btn {
            padding: 0.7rem;
            font-size: 0.9rem;
            margin-top: 0.8rem;
            border-radius: 8px;
            min-height: 44px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .alert {
            padding: 0.7rem;
            margin-bottom: 0.6rem;
            border-radius: 6px;
            border-left-width: 3px;
            font-size: 0.85rem;
        }

        .form-footer {
            font-size: 0.75rem;
            margin-top: 1rem;
        }

        .divider {
            margin: 0.8rem 0;
            font-size: 0.75rem;
        }

        .messages-container {
            margin-bottom: 0.8rem;
        }
    }

    @media (max-width: 360px) {
        .auth-card {
            padding: 1.2rem;
        }

        .tab-btn {
            padding: 0.55rem;
            font-size: 0.75rem;
        }

        .auth-card h2 {
            font-size: 1.2rem;
        }

        .form-group label {
            font-size: 0.8rem;
        }

        .form-group input {
            padding: 0.65rem;
            font-size: 0.9rem;
        }

        .submit-btn {
            padding: 0.75rem;
            font-size: 0.85rem;
        }
    }

    /* ========== TABLET MEDIA QUERIES ========== */
    @media (min-width: 769px) and (max-width: 1024px) {
        .auth-wrapper {
            max-width: 480px;
        }

        .auth-card {
            padding: 2.2rem;
        }

        .auth-card h2 {
            font-size: 1.6rem;
        }

        .tab-btn {
            font-size: 0.95rem;
            padding: 0.9rem;
        }
    }

    /* ========== TOUCH-FRIENDLY INTERACTIONS ========== */
    @media (hover: none) and (pointer: coarse) {
        .tab-btn,
        .submit-btn,
        .form-group input {
            min-height: 48px;
            padding: 0.75rem;
        }

        .form-group input {
            min-height: 48px;
        }

        .tab-btn {
            min-width: 48px;
        }

        .submit-btn {
            min-height: 52px;
        }

        .form-footer a {
            padding: 0.5rem;
            display: inline-block;
        }

        .submit-btn:hover {
            transform: none;
        }

        .submit-btn:active {
            transform: scale(0.97);
        }
    }

    /* ========== ANIMATION PERFORMANCE ========== */
    @media (prefers-reduced-motion: reduce) {
        * {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 0.01ms !important;
        }
    }

    /* ========== DARK MODE OPTIMIZATION ========== */
    @media (prefers-color-scheme: dark) {
        .auth-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(240, 147, 251, 0.2));
        }

        .tab-container {
            background: rgba(0, 0, 0, 0.3);
        }
    }

    /* ========== HIGH CONTRAST MODE ========== */
    @media (prefers-contrast: more) {
        .auth-card {
            border: 2px solid rgba(102, 126, 234, 0.5);
        }

        .form-group input {
            border-width: 2px;
        }

        .submit-btn {
            border: 2px solid transparent;
        }
    }

    /* ========== SMOOTH SCROLLING ========== */
    html {
        scroll-behavior: smooth;
    }

    /* ========== FOCUS VISIBILITY ========== */
    *:focus {
        outline: 2px solid #667eea;
        outline-offset: 2px;
    }

    .form-group input:focus {
        outline: none;
        border-color: #667eea;
    }
</style>

<div class="auth-container">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="tab-container">
                <a href="{% url 'login' %}" class="tab-btn" style="text-align: center; text-decoration: none;">🔓 Sign In</a>
                <button class="tab-btn active">✨ Sign Up</button>
            </div>

            <!-- Messages -->
            <div class="messages-container">
                {% if error %}
                    <div class="alert alert-error">{{ error }}</div>
                {% endif %}
                {% if info %}
                    <div class="alert alert-success" style="background: rgba(34, 197, 94, 0.1); color: #86efac; border-left: 4px solid #22c55e; padding: 1rem; border-radius: 10px; margin-bottom: 1rem;">{{ info }}</div>
                {% endif %}
            </div>

            <!-- SIGN UP TAB -->
            <div class="tab-content active">
                <h2>Create Account</h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="email">📧 Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="mobile">📱 Mobile Number</label>
                        <input type="text" id="mobile" name="mobile" placeholder="Enter your mobile number" required>
                    </div>
                    {% for field in form %}
                        <div class="form-group">
                            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div style="color: #ffcdd2; font-size: 0.8rem; margin-top: 0.3rem;">{{ field.errors.0 }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="submit-btn">Sign Up ✨</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
